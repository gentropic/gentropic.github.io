// DOM helpers for @gcu/vfs — blob URLs, drag-drop, file picker
// Runtime guards: only functional in browser environments

const _blobCache = (typeof Map !== 'undefined') ? new Map() : null;
const _autoRevokeListeners = (typeof WeakMap !== 'undefined') ? new WeakMap() : null;

function toURL(vfs, p) {
  if (typeof Blob === 'undefined' || typeof URL === 'undefined') {
    throw new Error('toURL requires a browser environment');
  }
  const key = p;
  if (_blobCache && _blobCache.has(key)) return _blobCache.get(key);

  // Set up auto-revoke listener once per VFS instance
  if (_autoRevokeListeners && !_autoRevokeListeners.has(vfs)) {
    const handler = (e) => {
      if (_blobCache && _blobCache.has(e.path)) {
        URL.revokeObjectURL(_blobCache.get(e.path));
        _blobCache.delete(e.path);
      }
    };
    vfs.on('write', handler);
    _autoRevokeListeners.set(vfs, handler);
  }

  return vfs.readFile(p, 'bytes').then(data => {
    const mimeType = path.mime(p);
    const blob = new Blob([data], { type: mimeType });
    const url = URL.createObjectURL(blob);
    if (_blobCache) _blobCache.set(key, url);
    return url;
  });
}

function revokeURL(url) {
  if (typeof URL === 'undefined') return;
  URL.revokeObjectURL(url);
  if (_blobCache) {
    for (const [k, v] of _blobCache) {
      if (v === url) { _blobCache.delete(k); break; }
    }
  }
}

function revokeURLs(prefix) {
  if (!_blobCache) return;
  const toDelete = [];
  for (const [k, v] of _blobCache) {
    if (k.startsWith(prefix)) {
      if (typeof URL !== 'undefined') URL.revokeObjectURL(v);
      toDelete.push(k);
    }
  }
  for (const k of toDelete) _blobCache.delete(k);
}

async function fromDrop(vfs, event, destPath) {
  const files = event.dataTransfer ? event.dataTransfer.files : [];
  const paths = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const filePath = path.join(destPath, file.name);
    const buf = await file.arrayBuffer();
    await vfs.writeFile(filePath, new Uint8Array(buf));
    paths.push(filePath);
  }
  return paths;
}

function fromPicker(vfs, destPath, opts) {
  if (typeof document === 'undefined') {
    return Promise.reject(new Error('fromPicker requires a browser environment'));
  }
  return new Promise((resolve, reject) => {
    const input = document.createElement('input');
    input.type = 'file';
    if (opts && opts.multiple) input.multiple = true;
    if (opts && opts.accept) input.accept = opts.accept;
    if (opts && opts.directory) input.webkitdirectory = true;

    input.onchange = async () => {
      try {
        const paths = [];
        for (let i = 0; i < input.files.length; i++) {
          const file = input.files[i];
          const filePath = path.join(destPath, file.name);
          const buf = await file.arrayBuffer();
          await vfs.writeFile(filePath, new Uint8Array(buf));
          paths.push(filePath);
        }
        resolve(paths);
      } catch (e) {
        reject(e);
      }
    };
    input.click();
  });
}

// @gcu/vfs — integrated into the base image
// No plugin registration needed — VFS is available as a builtin.

// ── src/units.js ──
// paiol — units & conversions (§3).
//
// Two layers:
//   1. Built-in dimensions (mass, volume, count) with fixed ratios. Pure arithmetic.
//   2. Per-ingredient overrides that BRIDGE dimensions (`1 ovo = 50 g`,
//      `1 xicara = 120 g`). These are the first-class detail naive tools miss.
//
// We deliberately do NOT lean on @gcu/units here: it covers the built-in dimensions
// (and a lot of geoscience we don't need) but not the per-ingredient bridge, which is
// the actual hard part and is paiol-specific. Keeping the engine dependency-free keeps
// it trivially testable. Revisit if we ever want @gcu/units' breadth.

/**
 * Built-in unit ratios, expressed as "how many base units in one of this unit",
 * where the base unit of each dimension is the first listed (g, ml, un).
 * @type {Record<string, Record<string, number>>}
 */
const DIMENSIONS = {
  mass:   { g: 1, mg: 0.001, kg: 1000 },
  volume: { ml: 1, l: 1000 },
  count:  { un: 1 },
};

/** unit → its dimension name, for built-in units. */
const UNIT_DIMENSION = (() => {
  /** @type {Record<string, string>} */
  const m = {};
  for (const [dim, units] of Object.entries(DIMENSIONS)) {
    for (const u of Object.keys(units)) m[u] = dim;
  }
  return m;
})();

/** @returns {boolean} whether `u` is a known built-in unit. */
function isBuiltinUnit(u) {
  return Object.prototype.hasOwnProperty.call(UNIT_DIMENSION, u);
}

/**
 * Build the adjacency for an ingredient's conversion graph: built-in within-dimension
 * edges plus the ingredient's overrides, all bidirectional. Edge weight is the
 * multiplicative factor to apply when going from node A to node B (qty_B = qty_A * w).
 *
 * @param {import('./domain.js').Conversion[]} [overrides]
 * @returns {Map<string, Array<{ to: string, factor: number }>>}
 */
function buildGraph(overrides = []) {
  /** @type {Map<string, Array<{ to: string, factor: number }>>} */
  const adj = new Map();
  const addEdge = (from, to, factor) => {
    if (!adj.has(from)) adj.set(from, []);
    adj.get(from).push({ to, factor });
  };

  // Built-in edges: within each dimension, link every unit to the base and back.
  // 1 unit = ratio base-units, so going unit→base multiplies by ratio.
  for (const units of Object.values(DIMENSIONS)) {
    const entries = Object.entries(units);
    const [base] = entries[0]; // base has ratio 1
    for (const [u, ratio] of entries) {
      if (u === base) continue;
      addEdge(u, base, ratio);
      addEdge(base, u, 1 / ratio);
    }
  }

  // Override edges: `1 from = factor to` → from→to multiplies by factor.
  for (const c of overrides) {
    if (!c || c.factor === 0 || !isFinite(c.factor)) continue;
    addEdge(c.from, c.to, c.factor);
    addEdge(c.to, c.from, 1 / c.factor);
  }

  return adj;
}

/**
 * Convert `qty` from unit `from` to unit `to`, using built-in dimensions plus any
 * per-ingredient `overrides`. Finds a path through the conversion graph (BFS — shortest
 * hop count, which is also the least-surprising bridge). Throws if no path exists.
 *
 * @param {number} qty
 * @param {import('./domain.js').Unit} from
 * @param {import('./domain.js').Unit} to
 * @param {import('./domain.js').Conversion[]} [overrides]
 * @returns {number}
 */
function convert(qty, from, to, overrides = []) {
  if (from === to) return qty;

  const adj = buildGraph(overrides);
  // BFS from `from`, accumulating the multiplicative factor along the path.
  /** @type {Array<{ node: string, factor: number }>} */
  const queue = [{ node: from, factor: 1 }];
  const seen = new Set([from]);

  while (queue.length) {
    const { node, factor } = queue.shift();
    if (node === to) return qty * factor;
    for (const edge of adj.get(node) || []) {
      if (seen.has(edge.to)) continue;
      seen.add(edge.to);
      queue.push({ node: edge.to, factor: factor * edge.factor });
    }
  }

  throw new ConversionError(from, to);
}

class ConversionError extends Error {
  /** @param {string} from @param {string} to */
  constructor(from, to) {
    super(
      `Sem conversao de "${from}" para "${to}". ` +
      `Defina uma conversao no insumo (ex.: 1 ${from} = X ${to}).`,
    );
    this.name = 'ConversionError';
    this.from = from;
    this.to = to;
  }
}

// ── src/cost-engine.js ──
// paiol — cost engine (§4). All costs resolve to BRL per sellable unit.
//
// Pure functions over an indexed { ingredients, recipes, products, priceChanges,
// batches, sales } store plus a Config. The estimate/actuals split (§4.5) is the spine:
// it lives in a `lens` object the caller supplies, so the SAME engine computes both the
// pricing view (estimates) and the reporting view (actuals) with no branching inside.
//
// Build a lens with estimateLens(config) or actualLens(store, config, {...}).



// ── Store indexing ──────────────────────────────────────────────────────────

/**
 * @typedef {object} RawStore
 * @property {import('./domain.js').Ingredient[]}  [ingredients]
 * @property {import('./domain.js').Recipe[]}      [recipes]
 * @property {import('./domain.js').Product[]}     [products]
 * @property {import('./domain.js').PriceChange[]} [priceChanges]
 * @property {import('./domain.js').Batch[]}       [batches]
 * @property {import('./domain.js').Sale[]}        [sales]
 */

/**
 * Index a raw store into Maps for O(1) lookup. Idempotent-friendly: pass the result
 * back in and it is returned as-is.
 * @param {RawStore | Store} raw
 * @returns {Store}
 */
function indexStore(raw) {
  if (raw && raw.__indexed) return /** @type {Store} */ (raw);
  const byId = (arr) => new Map((arr || []).map((x) => [x.id, x]));
  return {
    __indexed: true,
    ingredients: byId(raw.ingredients),
    recipes: byId(raw.recipes),
    products: byId(raw.products),
    priceChanges: (raw.priceChanges || []).slice(),
    batches: (raw.batches || []).slice(),
    sales: (raw.sales || []).slice(),
  };
}

/**
 * @typedef {object} Store
 * @property {true} __indexed
 * @property {Map<string, import('./domain.js').Ingredient>} ingredients
 * @property {Map<string, import('./domain.js').Recipe>}     recipes
 * @property {Map<string, import('./domain.js').Product>}    products
 * @property {import('./domain.js').PriceChange[]}           priceChanges
 * @property {import('./domain.js').Batch[]}                 batches
 * @property {import('./domain.js').Sale[]}                  sales
 */

const ms = (iso) => new Date(iso).getTime();

// ── Prices ──────────────────────────────────────────────────────────────────

/**
 * The price of an ingredient (BRL per its stockUnit) as of `atMs`. The latest
 * PriceChange at-or-before `atMs`; if `atMs` is null, the latest of all time.
 * @param {Store} store
 * @param {string} ingredientId
 * @param {number|null} [atMs]
 * @returns {number}
 */
function priceOf(store, ingredientId, atMs = null) {
  let best = null;
  let bestAt = -Infinity;
  for (const pc of store.priceChanges) {
    if (pc.ingredientId !== ingredientId) continue;
    const t = ms(pc.at);
    if (atMs != null && t > atMs) continue;
    if (t >= bestAt) { bestAt = t; best = pc; }
  }
  if (!best) throw new PriceError(ingredientId);
  return best.price;
}

// ── Lenses (estimate vs actual; §4.5) ─────────────────────────────────────────

/**
 * @typedef {object} Lens
 * @property {number|null} priceAt                         // null = latest price
 * @property {(r: import('./domain.js').Recipe) => number} yieldOf
 * @property {(r: import('./domain.js').Recipe) => { active: number, oven: number }} timesOf
 * @property {number} totalActiveMinutesMonth              // fixed-rateio denominator
 */

/**
 * Pricing lens — drives prices. Nominal yields, recipe phase-time estimates, the
 * expected monthly active-minute budget.
 * @param {import('./domain.js').Config} config
 * @returns {Lens}
 */
function estimateLens(config) {
  return {
    priceAt: null,
    yieldOf: (r) => r.yieldNominal,
    timesOf: (r) => ({ active: r.activeMinutes, oven: r.ovenMinutes }),
    totalActiveMinutesMonth: config.expectedActiveMinutesMonth,
  };
}

/**
 * Reporting lens — reports reality. Actual yields and phase times from Batch events
 * (defaulting to the recipe estimate where a batch omits them), and the month's actual
 * summed active minutes as the rateio denominator.
 *
 * @param {Store} store
 * @param {import('./domain.js').Config} config
 * @param {{ atMs?: number|null, monthStartMs?: number, monthEndMs?: number }} [opts]
 * @returns {Lens}
 */
function actualLens(store, config, opts = {}) {
  const atMs = opts.atMs ?? null;
  // Latest batch per recipe at-or-before atMs.
  /** @type {Map<string, import('./domain.js').Batch>} */
  const latest = new Map();
  for (const b of store.batches) {
    const t = ms(b.at);
    if (atMs != null && t > atMs) continue;
    const prev = latest.get(b.recipeId);
    if (!prev || t >= ms(prev.at)) latest.set(b.recipeId, b);
  }

  // Month's actual active minutes, summed from batches in [monthStart, monthEnd).
  let totalActive = 0;
  if (opts.monthStartMs != null && opts.monthEndMs != null) {
    for (const b of store.batches) {
      const t = ms(b.at);
      if (t < opts.monthStartMs || t >= opts.monthEndMs) continue;
      const r = store.recipes.get(b.recipeId);
      totalActive += b.activeMinutes ?? r?.activeMinutes ?? 0;
    }
  }

  return {
    priceAt: atMs,
    yieldOf: (r) => latest.get(r.id)?.yieldActual ?? r.yieldNominal,
    timesOf: (r) => {
      const b = latest.get(r.id);
      return {
        active: b?.activeMinutes ?? r.activeMinutes,
        oven: b?.ovenMinutes ?? r.ovenMinutes,
      };
    },
    totalActiveMinutesMonth: totalActive || config.expectedActiveMinutesMonth,
  };
}

// ── Cost roll-up (§4.1–4.3) ───────────────────────────────────────────────────
//
// The DAG roll-up is unified across ALL FOUR cost dimensions, not just ingredients.
// The spec spells out CMV roll-up explicitly (§4.1) and is silent on labor/gas/fixed —
// but `Batch` events are per-recipe (a `massa` fornada logs its OWN active/oven minutes,
// and that massa is reused across many bolos), so a bolo's true cost must absorb the
// massa's per-gram labor/gas/fixed scaled by how much massa it consumes. Rolling up only
// ingredients would make every sub-recipe's baking time vanish and underprice the product.
//
// So each recipe contributes its OWN per-unit ingredients/labor/gas/fixed, plus, for every
// sub-recipe component, that sub's full per-unit breakdown scaled by (qty consumed / yield).

/**
 * @typedef {object} Breakdown
 * @property {number} ingredients  // CMV per yield-unit (the rolled-up §4.1 figure)
 * @property {number} labor        // mao de obra, per yield-unit
 * @property {number} gas          // oven gas, per yield-unit
 * @property {number} fixed        // allocated fixed cost (rateio), per yield-unit
 */

/**
 * Full per-yield-unit cost breakdown of a recipe, rolling the component DAG. Cycle-guarded:
 * a recipe may not, directly or transitively, contain itself (§2.2).
 *
 *   labor = valorHora * (activeMinutes / 60) / yield   // active time only, in HOURS
 *   gas   = taxaGas   *  ovenMinutes        / yield     // oven priced by the minute
 *
 * Note: the spec's §4.2 labor line wrote `activeMinutes * valorHora`, mixing minutes with a
 * per-hour rate (off by 60x). `valorHora` is BRL/hour here, so active minutes / 60. Gas is
 * consistent — `taxaGas` is BRL/minute.
 *
 * @param {Store} store @param {string} recipeId
 * @param {import('./domain.js').Config} config @param {Lens} lens
 * @param {Set<string>} [stack]  // recipes currently being expanded (cycle guard)
 * @returns {Breakdown}
 */
function costBreakdown(store, recipeId, config, lens, stack = new Set()) {
  const recipe = store.recipes.get(recipeId);
  if (!recipe) throw new RefError('recipe', recipeId);
  if (stack.has(recipeId)) throw new CycleError([...stack, recipeId]);
  stack.add(recipeId);

  const yield_ = yieldOrThrow(recipe, lens);
  const { active, oven } = lens.timesOf(recipe);

  // The recipe's own (non-component) costs.
  const out = {
    ingredients: 0,

 * @param {import('./domain.js').Config} config @param {Lens} lens

 * Suggested price from a unit cost (§4.4):

  if (divisor <= 0) throw new MarkupError(config.paymentFeePct, config.targetMarginPct);

 * @param {import('./domain.js').Config} config @param {Lens} lens
 * @returns {{ unitCost: number, price: number }}

  const unitCost = productUnitCost(store, productId, config, lens);

  if (i !== s.length) return null;

  // Per grammar:
  //   significand = digits "." [digits]   (intPart present, dot present)
  //               | "." digits             (intPart empty, dot present, fracPart non-empty)
  //               | digits                  (with exponent only)
  if (dotPresent) {
    if (intPart === '' && fracPart === '') return null;
  } else {
    if (intPart === '' || expPart === '') return null;
  }

  const digitsRe = c => c >= '0' && c <= '9';
  if (intPart && !validateUnderscored(intPart, digitsRe)) {
    return { error: 'malformed float significand', rule: '6.4' };
  }
  if (fracPart && !validateUnderscored(fracPart, digitsRe)) {
    return { error: 'malformed float fraction', rule: '6.4' };
  }
  if (expPart && !validateUnderscored(expPart, digitsRe)) {
    return { error: 'malformed float exponent', rule: '6.4' };
  }
  if ((s.startsWith('e') || s.startsWith('E')) && intPart === '') {
    return null;
  }

  let assembled = (intPart.replace(/_/g, '') || '0');
  if (dotPresent) assembled += '.' + (fracPart.replace(/_/g, '') || '0');
  if (expPart) assembled += 'e' + expSign + expPart.replace(/_/g, '');

  const value = sign * Number(assembled);
  if (!Number.isFinite(value)) {
    return { error: 'float not finite', rule: '6.4' };
  }
  return { value };
}

// ---- 9. Double-quoted string ---------------------------------------------

function parseDoubleQuoted(text, lineNumber, columnBase) {
  let i = 1;
  const out = [];
  while (i < text.length) {
    const c = text[i];
    if (c === '"') {
      if (i !== text.length - 1) {
        throw new YamlParseError('6.5', lineNumber, columnBase + i + 1,
          'unexpected content after closing double quote');
      }
      return scalar('string', out.join(''), {
        style: 'double',
        loc: { line: lineNumber, column: columnBase },
      });
    }
    if (c === '\\') {
      const e = text[i + 1];
      if (e === undefined) {
        throw new YamlParseError('6.5', lineNumber, columnBase + i,
          'incomplete escape sequence');
      }
      if (e === '"') { out.push('"'); i += 2; continue; }
      if (e === '\\') { out.push('\\'); i += 2; continue; }
      if (e === '/') { out.push('/'); i += 2; continue; }
      if (e === 'b') { out.push('\b'); i += 2; continue; }
      if (e === 'f') { out.push('\f'); i += 2; continue; }
      if (e === 'n') { out.push('\n'); i += 2; continue; }
      if (e === 'r') { out.push('\r'); i += 2; continue; }
      if (e === 't') { out.push('\t'); i += 2; continue; }
      if (e === 'u') {
        const hex = text.slice(i + 2, i + 6);
        if (!/^[0-9a-fA-F]{4}$/.test(hex)) {
          throw new YamlParseError('6.5', lineNumber, columnBase + i,
            'malformed \\uXXXX escape (needs 4 hex digits)');
        }
        out.push(String.fromCharCode(parseInt(hex, 16)));
        i += 6;
        continue;
      }
      throw new YamlParseError('6.5', lineNumber, columnBase + i,
        `invalid escape sequence \\${e}`);
    }
    const cc = c.charCodeAt(0);
    if (cc < 0x20 || cc === 0x7F) {
      throw new YamlParseError('6.5', lineNumber, columnBase + i,
        'raw control character in double-quoted string; use \\ escape');
    }
    out.push(c);
    i++;
  }
  throw new YamlParseError('6.5', lineNumber, columnBase,
    'unterminated double-quoted string (raw line break inside?)');
}

// ---- 10. Single-quoted string --------------------------------------------

function parseSingleQuoted(text, lineNumber, columnBase) {
  let i = 1;
  const out = [];
  while (i < text.length) {
    const c = text[i];
    if (c === "'") {
      if (text[i + 1] === "'") {
        out.push("'");
        i += 2;
        continue;
      }
      if (i !== text.length - 1) {
        throw new YamlParseError('6.5', lineNumber, columnBase + i + 1,
          'unexpected content after closing single quote');
      }
      return scalar('string', out.join(''), {
        style: 'single',
        loc: { line: lineNumber, column: columnBase },
      });
    }
    const cc = c.charCodeAt(0);
    if (cc < 0x20 || cc === 0x7F) {
      throw new YamlParseError('6.5', lineNumber, columnBase + i,
        'raw control character in single-quoted string; use double quotes with \\ escape');
    }
    out.push(c);
    i++;
  }
  throw new YamlParseError('6.5', lineNumber, columnBase,
    'unterminated single-quoted string (raw line break inside?)');
}

// ---- 11. Parse a quoted key inline ---------------------------------------

// Used by the parser when a line starts with " or '. Returns
// { key, consumed } where `consumed` is the number of chars read (including
// the closing quote). Throws on malformed quote.
function parseQuotedKey(content, lineNumber, columnBase) {
  const ch = content[0];
  if (ch !== '"' && ch !== "'") return null;

  let i = 1;
  if (ch === '"') {
    while (i < content.length) {
      if (content[i] === '\\') { i += 2; continue; }
      if (content[i] === '"') break;
      const cc = content.charCodeAt(i);
      if (cc < 0x20 || cc === 0x7F) {
        throw new YamlParseError('6.5', lineNumber, columnBase + i,
          'raw control character in double-quoted key');
      }
      i++;
    }
    if (content[i] !== '"') {
      throw new YamlParseError('6.5', lineNumber, columnBase,
        'unterminated double-quoted key');
    }
    const raw = content.slice(0, i + 1);
    const node = parseDoubleQuoted(raw, lineNumber, columnBase);
    return { keyNode: node, consumed: i + 1 };
  } else {
    while (i < content.length) {
      if (content[i] === "'" && content[i + 1] === "'") { i += 2; continue; }
      if (content[i] === "'") break;
      const cc = content.charCodeAt(i);
      if (cc < 0x20 || cc === 0x7F) {
        throw new YamlParseError('6.5', lineNumber, columnBase + i,
          'raw control character in single-quoted key');
      }
      i++;
    }
    if (content[i] !== "'") {
      throw new YamlParseError('6.5', lineNumber, columnBase,
        'unterminated single-quoted key');
    }
    const raw = content.slice(0, i + 1);
    const node = parseSingleQuoted(raw, lineNumber, columnBase);
    return { keyNode: node, consumed: i + 1 };
  }
}

// -- parse.js --

// Parser for @gcu/yaml.
//
// Recursive descent over the line records produced by preprocess().
// Each block (map or sequence) lives at one indent level; entries within a
// block all share that indent. Nested blocks sit at indent + 2.



function parse(text) {
  const lines = preprocess(text);
  if (lines.length === 0) {
    throw new YamlParseError('5.2', 1, 1, 'empty file');
  }

  const ctx = { lines, pos: 0, depth: 0 };

  const fileLeading = [];
  while (ctx.pos < ctx.lines.length) {
    const ln = ctx.lines[ctx.pos];
    if (ln.isBlank) { ctx.pos++; continue; }
    if (isCommentOnly(ln.content)) {
      fileLeading.push(commentBody(ln.content));
      ctx.pos++;
      continue;
    }
    break;
  }

  if (ctx.pos >= ctx.lines.length) {
    throw new YamlParseError('5.2', 1, 1,
      'file contains only comments/blanks; need a block map or sequence');
  }

  const firstLine = ctx.lines[ctx.pos];
  if (firstLine.indent !== 0) {
    throw new YamlParseError('5.3', firstLine.lineNumber, firstLine.indent + 1,
      'top-level content must start at column 0');
  }
  if (firstLine.content === '---' || firstLine.content === '...'
      || firstLine.content.startsWith('--- ') || firstLine.content.startsWith('... ')) {
    throw new YamlParseError('5.1', firstLine.lineNumber, 1,
      'document-start/end markers (--- / ...) not permitted; single document only');
  }
  // §5.2 — bare top-level scalars are not permitted. Detect by: not a seq
  // dash, and no ':' outside quotes on the first content line.
  if (!startsWithDash(firstLine.content) && !hasMapColonOutsideQuotes(firstLine.content)) {
    throw new YamlParseError('5.2', firstLine.lineNumber, 1,
      'top-level must be a block map or block sequence; bare scalars not permitted');
  }

  const root = parseBlockBody(ctx, 0, fileLeading, null);

  const tail = [];
  while (ctx.pos < ctx.lines.length) {
    const ln = ctx.lines[ctx.pos];
    if (ln.isBlank) { ctx.pos++; continue; }
    if (isCommentOnly(ln.content)) {
      tail.push(commentBody(ln.content));
      ctx.pos++;
      continue;
    }
    throw new YamlParseError('5.3', ln.lineNumber, ln.indent + 1,
      'unexpected content after root document');
  }
  if (tail.length > 0) {
    root.blockTrailingComments = root.blockTrailingComments.concat(tail);
  }

  return root;
}

// ---- Block body (map or seq) at the given indent --------------------------

function parseBlockBody(ctx, indent, leadingComments, topLevelTag) {
  if (++ctx.depth > MAX_DEPTH) {
    const ln = ctx.lines[ctx.pos] || { lineNumber: 1 };
    throw new YamlParseError('5.4', ln.lineNumber, indent + 1,
      'maximum nesting depth (64) exceeded');
  }

  let pendingComments = leadingComments.slice();
  while (ctx.pos < ctx.lines.length) {
    const ln = ctx.lines[ctx.pos];
    if (ln.isBlank) { ctx.pos++; continue; }
    if (isCommentOnly(ln.content)) {
      pendingComments.push(commentBody(ln.content));
      ctx.pos++;
      continue;
    }
    if (ln.indent < indent) {
      throw new YamlParseError('5.3', ln.lineNumber, ln.indent + 1,
        `unexpected dedent (expected indent ${indent}, got ${ln.indent})`);
    }
    if (ln.indent > indent) {
      throw new YamlParseError('5.3', ln.lineNumber, ln.indent + 1,
        `unexpected over-indent (expected ${indent}, got ${ln.indent})`);
    }
    break;
  }

  if (ctx.pos >= ctx.lines.length) {
    throw new YamlParseError('5.2', 1, 1,
      'expected map or sequence content but found EOF');
  }

  const firstLine = ctx.lines[ctx.pos];
  const isSeq = startsWithDash(firstLine.content);

  let node;
  if (isSeq) node = parseSeqBlock(ctx, indent, pendingComments, topLevelTag);
  else node = parseMapBlock(ctx, indent, pendingComments, topLevelTag);

  ctx.depth--;
  return node;
}

function startsWithDash(content) {
  return content[0] === '-'
    && (content.length === 1 || content[1] === ' ');
}

// True if a `:` appears outside any `"..."` or `'...'` quoted region.
function hasMapColonOutsideQuotes(content) {
  let inDQ = false, inSQ = false;
  for (let i = 0; i < content.length; i++) {
    const c = content[i];
    if (inDQ) {
      if (c === '\\') { i++; continue; }
      if (c === '"') inDQ = false;
      continue;
    }
    if (inSQ) {
      if (c === "'" && content[i + 1] === "'") { i++; continue; }
      if (c === "'") inSQ = false;
      continue;
    }
    if (c === '"') { inDQ = true; continue; }
    if (c === "'") { inSQ = true; continue; }
    if (c === ':') return true;
  }
  return false;
}

// ---- Map block -----------------------------------------------------------

function parseMapBlock(ctx, indent, firstEntryLeading, topLevelTag) {
  const entries = [];
  const seenKeys = new Set();
  let pendingComments = firstEntryLeading.slice();
  let firstLineNumber = ctx.lines[ctx.pos].lineNumber;

  while (ctx.pos < ctx.lines.length) {
    const ln = ctx.lines[ctx.pos];
    if (ln.isBlank) { ctx.pos++; continue; }
    if (isCommentOnly(ln.content)) {
      pendingComments.push(commentBody(ln.content));
      ctx.pos++;
      continue;
    }
    if (ln.indent < indent) break;
    if (ln.indent > indent) {
      throw new YamlParseError('5.3', ln.lineNumber, ln.indent + 1,
        `unexpected over-indent (expected ${indent})`);
    }
    if (startsWithDash(ln.content)) {
      throw new YamlParseError('8.4', ln.lineNumber, ln.indent + 1,
        'sequence entry not permitted inside a map block');
    }

    const entry = parseMapEntry(ctx, indent, pendingComments);
    pendingComments = [];
    if (seenKeys.has(entry.key.value)) {
      throw new YamlParseError('7.2', entry.key.loc.line, entry.key.loc.column,
        `duplicate map key '${entry.key.value}'`);
    }
    seenKeys.add(entry.key.value);
    entries.push(entry);
  }

  if (entries.length === 0) {
    throw new YamlParseError('5.2', firstLineNumber, indent + 1,
      'block map with no entries');
  }

  if (pendingComments.length > 0) {
    const last = entries[entries.length - 1].value;
    last.blockTrailingComments = last.blockTrailingComments.concat(pendingComments);
  }

  return mapNode(entries, {
    tag: topLevelTag,
    loc: { line: entries[0].key.loc.line, column: indent + 1 },
  });
}

// Parses a single map entry at ctx.lines[ctx.pos] (must be at `indent`).
// Advances ctx.pos past all consumed lines (including nested blocks and
// block scalar bodies).
function parseMapEntry(ctx, indent, leadingComments) {
  const ln = ctx.lines[ctx.pos];
  return parseMapEntryFromContent(ctx, ln.content, ln.lineNumber, indent + 1, indent + 2, leadingComments, /*advanceFirstLine=*/true);
}

// Core map-entry parser. Accepts a content string (already at column `keyCol`)
// and processes it. The "nested indent" for any block value is `nestedIndent`.
// If `advanceFirstLine` is true, ctx.pos is advanced past the current line
// after the inline portion is consumed.
function parseMapEntryFromContent(ctx, content, lineNum, keyCol, nestedIndent, leadingComments, advanceFirstLine) {
  // Key
  let keyNode, keyLen;
  if (content[0] === '"' || content[0] === "'") {
    const r = parseQuotedKey(content, lineNum, keyCol);
    keyNode = r.keyNode;
    keyLen = r.consumed;
  } else {
    const b = tryParseBareKey(content);
    if (!b) {
      throw new YamlParseError('7.1', lineNum, keyCol,
        'expected key (bare identifier or quoted string)');
    }
    keyNode = scalar('string', b.key, { loc: { line: lineNum, column: keyCol } });
    keyLen = b.len;
  }

  if (content[keyLen] !== ':') {
    throw new YamlParseError('7.1', lineNum, keyCol + keyLen,
      `expected ':' after key (got '${content[keyLen] || 'EOL'}')`);
  }

  // After the colon
  let afterColon = content.slice(keyLen + 1);
  const afterColonCol = keyCol + keyLen + 1;

  // Empty: `key:` end of line — nested block follows.
  if (afterColon.length === 0) {
    if (advanceFirstLine) ctx.pos++;
    const value = parseNestedValue(ctx, nestedIndent, lineNum, afterColonCol, null, null);
    value.leadingComments = leadingComments;
    return mapEntry(keyNode, value);
  }

  if (afterColon[0] !== ' ') {
    if (afterColon[0] === '\t') {
      throw new YamlParseError('4.4', lineNum, afterColonCol + 1,
        'tab not permitted as separator after colon');
    }
    throw new YamlParseError('8.2', lineNum, afterColonCol + 1,
      'colon must be followed by a space and a value (or end of line)');
  }

  // Consume one or more SPs as the colon/value separator. The canonical
  // emitter writes exactly one; the parser accepts column-aligned forms.
  let sepLen = 0;
  while (afterColon[sepLen] === ' ') sepLen++;
  const valuePart = afterColon.slice(sepLen);
  const valueCol = afterColonCol + sepLen;

  return finishInlineMapEntry(ctx, keyNode, valuePart, lineNum, valueCol, nestedIndent, leadingComments, advanceFirstLine);
}

function finishInlineMapEntry(ctx, keyNode, valuePart, lineNum, valueCol, nestedIndent, leadingComments, advanceFirstLine) {
  const { body, comment } = splitComment(valuePart);

  if (body.length === 0) {
    if (advanceFirstLine) ctx.pos++;
    const value = parseNestedValue(ctx, nestedIndent, lineNum, valueCol, comment, null);
    value.leadingComments = leadingComments;
    return mapEntry(keyNode, value);
  }

  let tag = null;
  let rest = body;
  if (rest[0] === '!') {
    const t = tryParseTag(rest, lineNum, valueCol);
    tag = t.tag;
    rest = t.restAfterTag;
  }

  if (rest.length === 0) {
    if (advanceFirstLine) ctx.pos++;
    const value = parseNestedValue(ctx, nestedIndent, lineNum, valueCol, comment, tag);
    value.leadingComments = leadingComments;
    return mapEntry(keyNode, value);
  }

  if (rest === '|' || rest === '|-') {
    if (advanceFirstLine) ctx.pos++;
    const chomp = rest === '|-' ? 'strip' : 'clip';
    const value = parseBlockScalar(ctx, nestedIndent, lineNum, chomp);
    if (tag) value.tag = tag;
    value.leadingComments = leadingComments;
    if (comment) value.trailingComment = comment;
    return mapEntry(keyNode, value);
  }
  rejectBadBlockScalar(rest, lineNum, valueCol);

  // Inline value.
  if (advanceFirstLine) ctx.pos++;
  const valueNode = buildValueNode(rest, lineNum, valueCol, tag, leadingComments, comment);
  rejectMixedContent(ctx, nestedIndent - 2);
  return mapEntry(keyNode, valueNode);
}

function buildValueNode(text, lineNum, col, tag, leadingComments, trailingComment) {
  const r = parseValueText(text, lineNum, col);
  let node;
  if (r.emptySeq) node = seqNode([], { loc: { line: lineNum, column: col } });
  else if (r.emptyMap) node = mapNode([], { loc: { line: lineNum, column: col } });
  else node = r.node;

  if (tag) node.tag = tag;
  node.leadingComments = leadingComments;
  if (trailingComment) node.trailingComment = trailingComment;
  return node;
}

function rejectBadBlockScalar(rest, lineNum, col) {
  if (rest === '|+' || /^\|[0-9]/.test(rest)) {
    throw new YamlParseError('6.6', lineNum, col,
      `block scalar form '${rest}' not permitted (only | and |-)`);
  }
  if (rest[0] === '>') {
    throw new YamlParseError('6.6', lineNum, col,
      'folded block scalar (>) not permitted');
  }
}

// Look ahead: if there's an over-indented non-blank/comment line right after,
// that's "value on this line + nested children" = mixed content (§8.4).
function rejectMixedContent(ctx, indent) {
  for (let p = ctx.pos; p < ctx.lines.length; p++) {
    const ln = ctx.lines[p];
    if (ln.isBlank) continue;
    if (isCommentOnly(ln.content)) continue;
    if (ln.indent > indent) {
      throw new YamlParseError('8.4', ln.lineNumber, ln.indent + 1,
        'value given on previous line; indented child not permitted');
    }
    return;
  }
}

// ---- Sequence block ------------------------------------------------------

function parseSeqBlock(ctx, indent, firstEntryLeading, topLevelTag) {
  const items = [];
  let pendingComments = firstEntryLeading.slice();
  let firstLineNumber = ctx.lines[ctx.pos].lineNumber;

  while (ctx.pos < ctx.lines.length) {
    const ln = ctx.lines[ctx.pos];
    if (ln.isBlank) { ctx.pos++; continue; }
    if (isCommentOnly(ln.content)) {
      pendingComments.push(commentBody(ln.content));
      ctx.pos++;
      continue;
    }
    if (ln.indent < indent) break;
    if (ln.indent > indent) {
      throw new YamlParseError('5.3', ln.lineNumber, ln.indent + 1,
        `unexpected over-indent (expected ${indent})`);
    }
    if (!startsWithDash(ln.content)) {
      throw new YamlParseError('8.4', ln.lineNumber, ln.indent + 1,
        'map entry not permitted inside a sequence block');
    }

    const itemValue = parseSeqEntry(ctx, indent, pendingComments);
    pendingComments = [];
    items.push(itemValue);
  }

  if (items.length === 0) {
    throw new YamlParseError('5.2', firstLineNumber, indent + 1,
      'block sequence with no entries');
  }

  if (pendingComments.length > 0) {
    const last = items[items.length - 1];
    last.blockTrailingComments = last.blockTrailingComments.concat(pendingComments);
  }

  return seqNode(items, {
    tag: topLevelTag,
    loc: { line: firstLineNumber, column: indent + 1 },
  });
}

function parseSeqEntry(ctx, indent, leadingComments) {
  const ln = ctx.lines[ctx.pos];
  const content = ln.content;
  const colBase = indent + 1;

  // Bare `-` alone — nested block follows on indented lines.
  if (content.length === 1) {
    ctx.pos++;
    const value = parseNestedValue(ctx, indent + 2, ln.lineNumber, colBase + 1, null, null);
    value.leadingComments = leadingComments;
    return value;
  }

  // `- value` shapes. Consume one or more SPs after the dash; the canonical
  // emitter writes exactly one, but the parser accepts column-aligned forms.
  let dashSep = 1;
  while (content[dashSep] === ' ') dashSep++;
  const valuePart = content.slice(dashSep);
  const valueCol = colBase + dashSep;

  const { body, comment } = splitComment(valuePart);

  if (body.length === 0) {
    ctx.pos++;
    const value = parseNestedValue(ctx, indent + 2, ln.lineNumber, valueCol, comment, null);
    value.leadingComments = leadingComments;
    return value;
  }

  let tag = null;
  let rest = body;
  let restCol = valueCol;
  if (rest[0] === '!') {
    const t = tryParseTag(rest, ln.lineNumber, valueCol);
    tag = t.tag;
    const consumed = rest.length - t.restAfterTag.length;
    restCol += consumed;
    rest = t.restAfterTag;
  }

  if (rest.length === 0) {
    ctx.pos++;
    const value = parseNestedValue(ctx, indent + 2, ln.lineNumber, valueCol, comment, tag);
    value.leadingComments = leadingComments;
    return value;
  }

  if (rest === '|' || rest === '|-') {
    ctx.pos++;
    const chomp = rest === '|-' ? 'strip' : 'clip';
    const value = parseBlockScalar(ctx, indent + 2, ln.lineNumber, chomp);
    if (tag) value.tag = tag;
    value.leadingComments = leadingComments;
    if (comment) value.trailingComment = comment;
    return value;
  }
  rejectBadBlockScalar(rest, ln.lineNumber, restCol);

  // "- key: value" embedded-map shorthand?
  if (looksLikeMapKey(rest)) {
    // Parse this line as a map entry at indent + 2, and continue collecting
    // further map entries at the same indent.
    const firstEntry = parseMapEntryFromContent(
      ctx, rest, ln.lineNumber, restCol, indent + 4, [], /*advanceFirstLine=*/false
    );
    ctx.pos++;  // consume the current line (parseMapEntryFromContent didn't)
    const trailingFirst = comment;
    if (trailingFirst) firstEntry.value.trailingComment = trailingFirst;

    const entries = [firstEntry];
    const seenKeys = new Set([firstEntry.key.value]);
    let pendingComments = [];

    while (ctx.pos < ctx.lines.length) {
      const nx = ctx.lines[ctx.pos];
      if (nx.isBlank) { ctx.pos++; continue; }
      if (isCommentOnly(nx.content)) {
        pendingComments.push(commentBody(nx.content));
        ctx.pos++;
        continue;
      }
      if (nx.indent < indent + 2) break;
      if (nx.indent > indent + 2) {
        throw new YamlParseError('5.3', nx.lineNumber, nx.indent + 1,
          `unexpected over-indent (expected ${indent + 2})`);
      }
      if (startsWithDash(nx.content)) {
        throw new YamlParseError('8.4', nx.lineNumber, nx.indent + 1,
          'sequence dash not permitted inside an embedded map');
      }
      const entry = parseMapEntry(ctx, indent + 2, pendingComments);
      pendingComments = [];
      if (seenKeys.has(entry.key.value)) {
        throw new YamlParseError('7.2', entry.key.loc.line, entry.key.loc.column,
          `duplicate map key '${entry.key.value}'`);
      }
      seenKeys.add(entry.key.value);
      entries.push(entry);
    }

    if (pendingComments.length > 0) {
      const last = entries[entries.length - 1].value;
      last.blockTrailingComments = last.blockTrailingComments.concat(pendingComments);
    }

    const mn = mapNode(entries, {
      tag,
      loc: { line: ln.lineNumber, column: restCol },
    });
    mn.leadingComments = leadingComments;
    return mn;
  }

  // Plain inline scalar / empty collection.
  ctx.pos++;
  const valueNode = buildValueNode(rest, ln.lineNumber, restCol, tag, leadingComments, comment);
  rejectMixedContent(ctx, indent);
  return valueNode;
}

// True if `text` begins with a bare or quoted key followed by `:`.
function looksLikeMapKey(text) {
  if (text[0] === '"' || text[0] === "'") {
    const qch = text[0];
    let i = 1;
    while (i < text.length) {
      if (qch === '"' && text[i] === '\\') { i += 2; continue; }
      if (qch === "'" && text[i] === "'" && text[i + 1] === "'") { i += 2; continue; }
      if (text[i] === qch) { i++; break; }
      i++;
    }
    return text[i] === ':';
  }
  const b = tryParseBareKey(text);
  if (!b) return false;
  return text[b.len] === ':';
}

// ---- Nested value (block following a `key:` or `- ` opener) --------------

function parseNestedValue(ctx, indent, parentLine, parentColumn, parentTrailingComment, topTag) {
  let p = ctx.pos;
  while (p < ctx.lines.length) {
    const ln = ctx.lines[p];
    if (ln.isBlank) { p++; continue; }
    if (isCommentOnly(ln.content)) { p++; continue; }
    break;
  }
  if (p >= ctx.lines.length) {
    throw new YamlParseError('7.3', parentLine, parentColumn,
      'expected nested block but found EOF (use explicit `null` or `""`)');
  }
  const next = ctx.lines[p];
  if (next.indent < indent) {
    throw new YamlParseError('7.3', parentLine, parentColumn,
      'expected nested block but next content is at parent indent or less');
  }
  if (next.indent !== indent) {
    throw new YamlParseError('5.3', next.lineNumber, next.indent + 1,
      `expected indent ${indent} for nested block, got ${next.indent}`);
  }
  const block = parseBlockBody(ctx, indent, [], topTag || null);
  if (parentTrailingComment) {
    block.trailingComment = parentTrailingComment;
  }
  return block;
}

// ---- Block scalar (| or |-) ----------------------------------------------

function parseBlockScalar(ctx, indent, openerLine, chomp) {
  const bodyLines = [];
  const blankIndices = [];

  while (ctx.pos < ctx.lines.length) {
    const ln = ctx.lines[ctx.pos];
    if (ln.isBlank) {
      bodyLines.push('');
      blankIndices.push(bodyLines.length - 1);
      ctx.pos++;
      continue;
    }
    if (ln.indent < indent) break;

    // Slice off `indent` SPs from the raw line, preserving any further chars
    // as content (including extra leading spaces).
    const raw = ln.raw;
    const stripped = raw.length >= indent ? raw.slice(indent) : '';
    // Per §4.4 the raw-line trailing-SP strip applies to non-block contexts;
    // inside a block-scalar body, trailing SP is part of content. Actually
    // §4.4: "Trailing SP on any line outside a "..." or '...' string is
    // stripped silently by the parser". This wording is ambiguous about
    // block scalars; spec example treats them as preserved content lines.
    // We'll preserve everything we slice — this matches the example output.
    bodyLines.push(stripped);
    ctx.pos++;
  }

  if (bodyLines.length === 0) {
    throw new YamlParseError('6.6', openerLine, indent + 1,
      'block scalar body is empty; use `""` for an empty string');
  }

  // Drop trailing blank body lines (they belong to the surrounding context,
  // not the scalar body).
  while (bodyLines.length > 0 && bodyLines[bodyLines.length - 1] === '') {
    bodyLines.pop();
  }
  if (bodyLines.length === 0) {
    throw new YamlParseError('6.6', openerLine, indent + 1,
      'block scalar body is empty after trimming blanks');
  }

  let value = bodyLines.join('\n');
  if (chomp === 'clip') value += '\n';

  return scalar('string', value, {
    style: 'block-' + chomp,
    loc: { line: openerLine + 1, column: indent + 1 },
  });
}

// -- emit.js --

// Canonical emitter for @gcu/yaml.
//
// Pure function from AST to bytes. No configuration; the canonical form is
// fixed by §12.5:
//   - 2 SP per indent level
//   - LF only, exactly one at EOF, no trailing SP on any line
//   - Strings emit as "..." by default; style='single' → '...'; block scalars
//     emit as | or |- with body at indent + 2
//   - Integers emit in decimal unless radix hint says hex/oct/bin (lowercase)
//   - Floats emit in shortest decimal round-trip form with explicit '.'
//   - Empty collections emit as [] or {}
//   - Tags emit as !name before the tagged value

function emit(ast) {
  if (ast.kind !== 'map' && ast.kind !== 'seq') {
    throw new Error('emit: top-level must be map or seq');
  }
  const out = [];
  // Leading comments on the root (file-level pre-comments) — these were
  // attached to the first entry, so they come out naturally.
  emitBlock(ast, 0, out, ast.tag || null);
  // File-level trailing comments
  for (const c of ast.blockTrailingComments) {
    out.push('#' + c);
  }
  return out.join('\n') + '\n';
}

// ---- Block emitters ------------------------------------------------------

function emitBlock(node, indent, out, /*unused*/ tagOnBlock) {
  if (node.kind === 'map') emitMapBlock(node, indent, out);
  else if (node.kind === 'seq') emitSeqBlock(node, indent, out);
}

function emitMapBlock(map, indent, out) {
  const pad = ' '.repeat(indent);
  for (const entry of map.entries) {
    for (const c of entry.value.leadingComments) {
      out.push(pad + '#' + c);
    }
    emitMapEntry(entry, indent, out);
    for (const c of entry.value.blockTrailingComments) {
      out.push(pad + '#' + c);
    }
  }
}

function emitSeqBlock(seq, indent, out) {
  const pad = ' '.repeat(indent);
  for (const item of seq.items) {
    for (const c of item.leadingComments) {
      out.push(pad + '#' + c);
    }
    emitSeqItem(item, indent, out);
    for (const c of item.blockTrailingComments) {
      out.push(pad + '#' + c);
    }
  }
}

function emitMapEntry(entry, indent, out) {
  const pad = ' '.repeat(indent);
  const keyRepr = emitKey(entry.key);
  const value = entry.value;
  const shape = valueShape(value);
  const tagPart = value.tag ? ' !' + value.tag : '';
  const trailing = value.trailingComment ? '  #' + value.trailingComment : '';

  if (shape === 'inline') {
    out.push(pad + keyRepr + ':' + tagPart + ' ' + emitInlineValue(value) + trailing);
  } else if (shape === 'block-scalar') {
    const opener = value.style === 'block-strip' ? '|-' : '|';
    out.push(pad + keyRepr + ':' + tagPart + ' ' + opener + trailing);
    emitBlockScalarBody(value.value, indent + 2, out);
  } else if (shape === 'nested-map') {
    out.push(pad + keyRepr + ':' + tagPart + trailing);
    emitMapBlock(value, indent + 2, out);
  } else if (shape === 'nested-seq') {
    out.push(pad + keyRepr + ':' + tagPart + trailing);
    emitSeqBlock(value, indent + 2, out);
  }
}

function emitSeqItem(item, indent, out) {
  const pad = ' '.repeat(indent);
  const tagPart = item.tag ? ' !' + item.tag : '';
  const trailing = item.trailingComment ? '  #' + item.trailingComment : '';

  const shape = valueShape(item);

  if (shape === 'inline') {
    if (item.kind === 'scalar') {
      out.push(pad + '-' + tagPart + ' ' + emitScalar(item) + trailing);
    } else {
      // empty map or seq
      const repr = item.kind === 'map' ? '{}' : '[]';
      out.push(pad + '-' + tagPart + ' ' + repr + trailing);
    }
  } else if (shape === 'block-scalar') {
    const opener = item.style === 'block-strip' ? '|-' : '|';
    out.push(pad + '-' + tagPart + ' ' + opener + trailing);
    emitBlockScalarBody(item.value, indent + 2, out);
  } else if (shape === 'nested-map') {
    // PAIOL LOCAL PATCH (round-trip bug): the embedded-map form ("- key: …" on the dash
    // line) is only re-parsable when the first value is inline/block-scalar. A "- key:"
    // whose first value is itself a block map/seq cannot be read back by this same parser
    // (rule 7.3). When the first value is a block, fall back to the bare-dash form: dash
    // alone, full map block below. Report upstream to @gcu/yaml; remove on re-vendor once
    // ext/yaml/src/emit.js carries the same guard.
    const firstShape = valueShape(item.entries[0].value);
    if (firstShape === 'nested-map' || firstShape === 'nested-seq') {
      out.push(pad + '-' + tagPart + trailing);
      emitMapBlock(item, indent + 2, out);
    } else {
      emitEmbeddedMap(item, indent, out);
    }
  } else if (shape === 'nested-seq') {
    // Bare dash, nested seq below.
    out.push(pad + '-' + tagPart + trailing);
    emitSeqBlock(item, indent + 2, out);
  }
}

function emitEmbeddedMap(mapNode, indent, out) {
  const pad = ' '.repeat(indent);
  const tagPart = mapNode.tag ? ' !' + mapNode.tag : '';

  const entries = mapNode.entries;
  const first = entries[0];
  const firstVal = first.value;
  const firstKey = emitKey(first.key);

  const firstShape = valueShape(firstVal);
  const firstTrailing = firstVal.trailingComment ? '  #' + firstVal.trailingComment : '';
  const firstValTag = firstVal.tag ? ' !' + firstVal.tag : '';

  if (firstShape === 'inline') {
    out.push(pad + '-' + tagPart + ' ' + firstKey + ':' + firstValTag + ' '
      + emitInlineValue(firstVal) + firstTrailing);
  } else if (firstShape === 'block-scalar') {
    const opener = firstVal.style === 'block-strip' ? '|-' : '|';
    out.push(pad + '-' + tagPart + ' ' + firstKey + ':' + firstValTag + ' '
      + opener + firstTrailing);
    emitBlockScalarBody(firstVal.value, indent + 4, out);
  } else if (firstShape === 'nested-map') {
    out.push(pad + '-' + tagPart + ' ' + firstKey + ':' + firstValTag + firstTrailing);
    emitMapBlock(firstVal, indent + 4, out);
  } else if (firstShape === 'nested-seq') {
    out.push(pad + '-' + tagPart + ' ' + firstKey + ':' + firstValTag + firstTrailing);
    emitSeqBlock(firstVal, indent + 4, out);
  }

  // First entry's block-trailing comments (at the map's indent = indent + 2).
  const subIndent = indent + 2;
  const subPad = ' '.repeat(subIndent);
  for (const c of firstVal.blockTrailingComments) {
    out.push(subPad + '#' + c);
  }

  // Remaining entries at indent + 2.
  for (let i = 1; i < entries.length; i++) {
    const entry = entries[i];
    for (const c of entry.value.leadingComments) {
      out.push(subPad + '#' + c);
    }
    emitMapEntry(entry, subIndent, out);
    for (const c of entry.value.blockTrailingComments) {
      out.push(subPad + '#' + c);
    }
  }
}

// ---- Shape classification ------------------------------------------------

function valueShape(value) {
  if (value.kind === 'scalar') {
    if (value.type === 'string'
        && (value.style === 'block-clip' || value.style === 'block-strip')) {
      return 'block-scalar';
    }
    return 'inline';
  }
  if (value.kind === 'map') return value.entries.length === 0 ? 'inline' : 'nested-map';
  if (value.kind === 'seq') return value.items.length === 0 ? 'inline' : 'nested-seq';
}

function emitInlineValue(value) {
  if (value.kind === 'scalar') return emitScalar(value);
  if (value.kind === 'map') return '{}';
  if (value.kind === 'seq') return '[]';
}

// ---- Scalars -------------------------------------------------------------

function emitScalar(s) {
  if (s.type === 'null') return 'null';
  if (s.type === 'bool') return s.value ? 'true' : 'false';
  if (s.type === 'int') return emitInt(s);
  if (s.type === 'float') return emitFloat(s.value);
  if (s.type === 'string') {
    if (s.style === 'single') return emitSingleQuoted(s.value);
    return emitDoubleQuoted(s.value);
  }
  throw new Error('emitScalar: unknown type ' + s.type);
}

function emitDoubleQuoted(value) {
  let out = '"';
  for (let i = 0; i < value.length; i++) {
    const ch = value[i];
    const cc = value.charCodeAt(i);
    if (ch === '"') out += '\\"';
    else if (ch === '\\') out += '\\\\';
    else if (ch === '\n') out += '\\n';
    else if (ch === '\r') out += '\\r';
    else if (ch === '\t') out += '\\t';
    else if (ch === '\b') out += '\\b';
    else if (ch === '\f') out += '\\f';
    else if (cc < 0x20 || cc === 0x7F) {
      out += '\\u' + cc.toString(16).padStart(4, '0');
    } else {
      out += ch;
    }
  }
  return out + '"';
}

function emitSingleQuoted(value) {
  // Single-quoted can't carry control chars; if any are present, fall back to
  // double-quoted (which has escape sequences).
  for (let i = 0; i < value.length; i++) {
    const cc = value.charCodeAt(i);
    if (cc < 0x20 || cc === 0x7F) return emitDoubleQuoted(value);
  }
  return "'" + value.replace(/'/g, "''") + "'";
}

function emitInt(node) {
  const v = node.value;
  let s;
  if (node.radix === 'hex') s = (v < 0 ? '-' : '') + '0x' + Math.abs(v).toString(16);
  else if (node.radix === 'oct') s = (v < 0 ? '-' : '') + '0o' + Math.abs(v).toString(8);
  else if (node.radix === 'bin') s = (v < 0 ? '-' : '') + '0b' + Math.abs(v).toString(2);
  else s = String(v);

  if (node.separators) s = applyGrouping(s, node.radix);
  return s;
}

function applyGrouping(s, radix) {
  let prefix = '';
  let digits = s;
  if (s.startsWith('-')) { prefix = '-'; digits = s.slice(1); }
  if (digits.startsWith('0x') || digits.startsWith('0o') || digits.startsWith('0b')) {
    prefix += digits.slice(0, 2);
    digits = digits.slice(2);
  }
  const groupSize = (radix === 'hex' || radix === 'bin') ? 4 : 3;
  let result = '';
  for (let i = 0; i < digits.length; i++) {
    if (i > 0 && (digits.length - i) % groupSize === 0) result += '_';
    result += digits[i];
  }
  return prefix + result;
}

function emitFloat(v) {
  let s = String(v);
  if (!/[.eE]/.test(s)) s += '.0';
  return s;
}

// ---- Keys ----------------------------------------------------------------

function emitKey(keyNode) {
  const k = keyNode.value;
  if (keyNode.style !== 'single' && isBareKey(k)) return k;
  if (keyNode.style === 'single') return emitSingleQuoted(k);
  return emitDoubleQuoted(k);
}

function isBareKey(s) {
  if (s.length === 0) return false;
  if (!/[A-Za-z_]/.test(s[0])) return false;
  for (let i = 1; i < s.length; i++) {
    if (!/[A-Za-z0-9_.\-]/.test(s[i])) return false;
  }
  return true;
}

// ---- Block scalar body ---------------------------------------------------

function emitBlockScalarBody(text, indent, out) {
  let body = text;
  // For clip the body ends with \n; for strip it doesn't. The trailing \n
  // would split as an extra empty line, which we don't want as a body line.
  if (body.endsWith('\n')) body = body.slice(0, -1);
  const lines = body.split('\n');
  const pad = ' '.repeat(indent);
  for (const ln of lines) {
    if (ln === '') out.push('');
    else out.push(pad + ln);
  }
}

// -- api.js --

// Public surface for @gcu/yaml.




// Returns null if `text` parses successfully, otherwise the YamlParseError
// instance from the strict parser.
function check(text) {
  try {
    parse(text);
    return null;
  } catch (e) {
    return e;
  }
}

// Parse + emit. Convenience for one-shot canonicalization.
function format(text) {
  return emit(parse(text));
}

// ── src/yaml-bridge.js ──
// paiol — JS value <-> @gcu/yaml bridge.
//
// @gcu/yaml is AST-based (parse -> AST, emit -> canonical string); it deliberately ships
// no JS-value convenience layer. paiol's at-rest format (§5) is one diffable YAML document,
// so we need plain-object <-> YAML. This is that thin, total bridge over the AST factories.
//
// The strict-YAML guarantees carry through: every scalar is explicitly typed, nothing is
// implicitly coerced, the output round-trips identically through vanilla YAML parsers.



/**
 * Convert a JSON-like JS value into a @gcu/yaml AST node.
 * Supported: null/undefined, boolean, finite number, string, array, plain object.
 * Object properties whose value is `undefined` are omitted (matches optional fields).
 * @param {*} value
 * @returns {object} AST node
 */
function toNode(value) {
  if (value === null || value === undefined) return scalar('null', null);
  const t = typeof value;
  if (t === 'boolean') return scalar('bool', value);
  if (t === 'number') {
    if (!Number.isFinite(value)) throw new YamlBridgeError(`numero nao-finito: ${value}`);
    return Number.isInteger(value) ? scalar('int', value) : scalar('float', value);
  }
  if (t === 'string') return scalar('string', value);
  if (Array.isArray(value)) return seqNode(value.map(toNode));
  if (t === 'object') {
    const entries = [];
    for (const [k, v] of Object.entries(value)) {
      if (v === undefined) continue;
      entries.push({ key: scalar('string', k), value: toNode(v) });
    }
    return mapNode(entries);
  }
  throw new YamlBridgeError(`tipo nao serializavel: ${t}`);
}

/**
 * Convert a @gcu/yaml AST node back into a plain JS value.
 * @param {object} node
 * @returns {*}
 */
function fromNode(node) {
  switch (node.kind) {
    case 'scalar':
      return node.value; // parser already produced the typed JS primitive
    case 'seq':
      return node.items.map(fromNode);
    case 'map': {
      /** @type {Record<string, *>} */
      const obj = {};
      for (const e of node.entries) obj[e.key.value] = fromNode(e.value);
      return obj;
    }
    default:
      throw new YamlBridgeError(`no desconhecido: ${node.kind}`);
  }
}

/**
 * Serialize a JS value to canonical strict-YAML text.
 * @param {*} value
 * @returns {string}
 */
function toYaml(value) {
  const out = emit(toNode(value));
  return typeof out === 'string' ? out : new TextDecoder().decode(out);
}

/**
 * Parse strict-YAML text into a JS value. Throws YamlParseError on malformed input.
 * @param {string} text
 * @returns {*}
 */
function fromYaml(text) {
  return fromNode(parse(text));
}

class YamlBridgeError extends Error {
  constructor(message) {
    super(message);
    this.name = 'YamlBridgeError';
  }
}

// ── src/store.js ──
// paiol — the business store. The whole business is one in-memory state object that
// serializes to a single diffable YAML document (§5). Master data is mutable; the
// money-relevant facts (prices, batches, sales) are append-only immutable events (§2).
//
// Local-first: this object is the source of truth. Persistence (IndexedDB / Dropbox) and
// the UI sit on top; the cost engine reads `toEngineStore()`. Nothing here touches I/O.




const SCHEMA_VERSION = 1;

/** Append-only, immutable event collections (§2.2). */
const EVENT_COLLECTIONS = ['priceChanges', 'batches', 'sales'];
/** Mutable master-data collections (§2.1). */
const MASTER_COLLECTIONS = ['ingredients', 'recipes', 'products'];
const ALL = [...MASTER_COLLECTIONS, ...EVENT_COLLECTIONS];

/**
 * Engine config defaults (§4). Placeholders Nayara tunes in Ajustes; `rateioBase` stays hidden
 * (§4.3). `custosFixosMes` is the whole monthly fixed pool, DAS included (R$ 82,05 for 2026).
 * @type {import('./domain.js').Config}
 */
const DEFAULT_CONFIG = {
  valorHora: 20,                    // BRL/hour of hands-on time
  taxaGas: 0.10,                    // BRL/minute of oven
  custosFixosMes: 500,              // monthly fixed pool (rent, internet, DAS, …)
  expectedActiveMinutesMonth: 2400, // ~40h/month (pricing-lens rateio denominator; §8.3)
  targetMarginPct: 0.30,
  paymentFeePct: 0.05,
  rateioBase: 'active-time',
};
const CONFIG_KEYS = Object.keys(DEFAULT_CONFIG);

/**
 * @typedef {object} State
 * @property {number} version
 * @property {import('./domain.js').Config} config
 * @property {import('./domain.js').Ingredient[]}  ingredients
 * @property {import('./domain.js').Recipe[]}      recipes
 * @property {import('./domain.js').Product[]}     products
 * @property {import('./domain.js').PriceChange[]} priceChanges
 * @property {import('./domain.js').Batch[]}       batches
 * @property {import('./domain.js').Sale[]}        sales
 */

/** @returns {State} a fresh empty state. */
function emptyState() {
  return {
    version: SCHEMA_VERSION,
    config: { ...DEFAULT_CONFIG },
    ingredients: [], recipes: [], products: [],
    priceChanges: [], batches: [], sales: [],
  };
}

class PaiolStore {
  /** @param {Partial<State>} [state] */
  constructor(state) {
    /** @type {State} */
    this.state = { ...emptyState(), ...(state || {}) };
    // Normalize: ensure every collection exists and is an array.
    for (const c of ALL) if (!Array.isArray(this.state[c])) this.state[c] = [];
    this.state.version = this.state.version || SCHEMA_VERSION;
    // Backfill config defaults for any missing key (forward-compatible loads).
    this.state.config = { ...DEFAULT_CONFIG, ...(this.state.config || {}) };
  }

  // ── Config (engine settings; §4) ─────────────────────────────────────────────

  /** @returns {import('./domain.js').Config} */
  getConfig() { return this.state.config; }

  /** Patch config in place. @param {Partial<import('./domain.js').Config>} partial */
  setConfig(partial) { Object.assign(this.state.config, partial); return this.state.config; }

  /** Latest price for an ingredient (BRL per stockUnit), or null if none recorded yet. */
  currentPrice(ingredientId) {
    let best = null; let bestAt = '';
    for (const pc of this.state.priceChanges) {
      if (pc.ingredientId === ingredientId && pc.at >= bestAt) { bestAt = pc.at; best = pc; }
    }
    return best ? best.price : null;
  }

  // ── Master data (mutable upsert/remove) ──────────────────────────────────────

  /** @param {import('./domain.js').Ingredient} x */
  upsertIngredient(x) { return this._upsert('ingredients', x); }
  /** @param {import('./domain.js').Recipe} x */
  upsertRecipe(x) { return this._upsert('recipes', x); }
  /** @param {import('./domain.js').Product} x */
  upsertProduct(x) { return this._upsert('products', x); }

  removeIngredient(id) { return this._remove('ingredients', id); }
  removeRecipe(id) { return this._remove('recipes', id); }
  removeProduct(id) { return this._remove('products', id); }

  // ── Events (append-only) ─────────────────────────────────────────────────────

  /** @param {import('./domain.js').PriceChange} ev */
  addPriceChange(ev) { return this._append('priceChanges', ev); }
  /** @param {import('./domain.js').Batch} ev */
  addBatch(ev) { return this._append('batches', ev); }
  /** @param {import('./domain.js').Sale} ev */
  addSale(ev) { return this._append('sales', ev); }

  // ── Read model ───────────────────────────────────────────────────────────────

  /** Index the state for the cost engine. */
  toEngineStore() { return indexStore(this.state); }

  /** Get a master record by id, or undefined. */
  get(collection, id) { return this.state[collection].find((x) => x.id === id); }

  // ── Merge (sync — union by id; §2.2) ─────────────────────────────────────────

  /**
   * Merge another store/state into this one. Events union by id (immutable, so a shared
   * id means identical content — duplicates are dropped). Master data: incoming replaces
   * existing by id (last-writer; v0.1 single-user, no vector clocks yet).
   * @param {PaiolStore | State} other
   * @returns {{ eventsAdded: number, masterUpserted: number }}
   */
  merge(other) {
    const o = other instanceof PaiolStore ? other.state : other;
    let eventsAdded = 0;
    let masterUpserted = 0;

    for (const c of EVENT_COLLECTIONS) {
      const seen = new Set(this.state[c].map((x) => x.id));
      for (const ev of o[c] || []) {
        if (seen.has(ev.id)) continue;
        seen.add(ev.id);
        this.state[c].push(ev);
        eventsAdded++;
      }
    }
    for (const c of MASTER_COLLECTIONS) {
      for (const rec of o[c] || []) {
        this._upsert(c, rec);
        masterUpserted++;
      }
    }
    // Config is a singleton: incoming wins (last-writer; v0.1 single-user, no vector clocks).
    if (o.config) this.setConfig(o.config);
    return { eventsAdded, masterUpserted };
  }

  // ── Serialization (§5 — one YAML document) ───────────────────────────────────

  /**
   * @returns {string} canonical strict-YAML of the whole business.
   * Deterministic regardless of insertion/merge order: collection key order is fixed, events
   * are sorted chronologically by (at, id), master data by id. This is what makes the file
   * diff-stable (§5) AND makes sync converge byte-identically across devices — two stores with
   * the same data serialize to the same bytes.
   */
  toYaml() {
    const ordered = { version: this.state.version, config: orderedConfig(this.state.config) };
    for (const c of MASTER_COLLECTIONS) ordered[c] = sortBy(this.state[c], byId);
    for (const c of EVENT_COLLECTIONS) ordered[c] = sortBy(this.state[c], byAtThenId);
    return toYaml(ordered);
  }

  /** @param {string} text @returns {PaiolStore} */
  static fromYaml(text) {
    return new PaiolStore(/** @type {Partial<State>} */ (fromYaml(text)));
  }

  /** @returns {PaiolStore} a deep-ish copy (records shared; collections fresh). */
  clone() {
    const copy = emptyState();
    copy.version = this.state.version;
    copy.config = { ...this.state.config };
    for (const c of ALL) copy[c] = this.state[c].slice();
    return new PaiolStore(copy);
  }

  // ── internals ────────────────────────────────────────────────────────────────

  _upsert(collection, rec) {
    if (!rec || typeof rec.id !== 'string' || !rec.id) {
      throw new StoreError(`registro de ${collection} precisa de um id`);
    }
    const arr = this.state[collection];
    const i = arr.findIndex((x) => x.id === rec.id);
    if (i >= 0) arr[i] = rec; else arr.push(rec);
    return rec;
  }

  _remove(collection, id) {
    const arr = this.state[collection];
    const i = arr.findIndex((x) => x.id === id);
    if (i >= 0) { arr.splice(i, 1); return true; }
    return false;
  }

  _append(collection, ev) {
    if (!ev || typeof ev.id !== 'string' || !ev.id) {
      throw new StoreError(`evento de ${collection} precisa de um id`);
    }
    if (typeof ev.at !== 'string' || !ev.at) {
      throw new StoreError(`evento de ${collection} precisa de uma data (at)`);
    }
    if (this.state[collection].some((x) => x.id === ev.id)) {
      throw new StoreError(`evento duplicado em ${collection}: ${ev.id}`);
    }
    this.state[collection].push(ev);
    return ev;
  }
}

// Deterministic ordering for serialization (does not mutate the live arrays).
function orderedConfig(config) {
  const out = {};
  for (const k of CONFIG_KEYS) if (config[k] !== undefined) out[k] = config[k];
  return out;
}
function sortBy(arr, cmp) { return arr.slice().sort(cmp); }
function byId(a, b) { return a.id < b.id ? -1 : a.id > b.id ? 1 : 0; }
function byAtThenId(a, b) {
  if (a.at !== b.at) return a.at < b.at ? -1 : 1;
  return byId(a, b);
}

class StoreError extends Error {
  constructor(message) {
    super(message);
    this.name = 'StoreError';
  }
}

// ── src/persist.js ──
// paiol — persistence over @gcu/vfs. Backend-agnostic by design: the SAME code persists
// to IndexedDB (local source of truth) and to Dropbox (durable backup / sync) because both
// are just VFS backends. The store serializes to one YAML document (§5).
//
// This module does I/O but knows nothing about which backend it's writing to — the caller
// mounts a VFS (IDBBackend for local, DropboxBackend for remote) and hands it in.



const DEFAULT_PATH = '/paiol/business.yaml';
const SNAPSHOT_DIR = '/paiol/snapshots';

/**
 * Load the business from a VFS path. Returns a fresh empty store if the file is absent.
 * @param {object} vfs  a @gcu/vfs VFS instance
 * @param {string} [path]
 * @returns {Promise<PaiolStore>}
 */
async function loadStore(vfs, path = DEFAULT_PATH) {
  if (!(await vfs.exists(path))) return new PaiolStore();
  const text = await vfs.readFile(path, 'utf8');
  return PaiolStore.fromYaml(text);
}

/**
 * Write the whole business to a VFS path (atomic at the backend level — Dropbox commits the
 * whole file or nothing). Creates parent directories as needed.
 * @param {object} vfs @param {PaiolStore} store @param {string} [path]
 * @returns {Promise<string>} the path written
 */
async function saveStore(vfs, store, path = DEFAULT_PATH) {
  await ensureDir(vfs, parentOf(path));
  await vfs.writeFile(path, store.toYaml());
  return path;
}

/**
 * Write a dated snapshot (`paiol-2026-06.yaml`) so recovery doesn't depend on the backend's
 * own version retention (§5 safety nets).
 * @param {object} vfs @param {PaiolStore} store @param {string} label  e.g. "2026-06"
 * @param {string} [dir]
 * @returns {Promise<string>} the snapshot path
 */
async function snapshotStore(vfs, store, label, dir = SNAPSHOT_DIR) {
  await ensureDir(vfs, dir);
  const path = `${dir}/paiol-${label}.yaml`;
  await vfs.writeFile(path, store.toYaml());
  return path;
}

/**
 * A debounced background saver (§5 write path): IndexedDB is written shortly after each
 * change rather than on every keystroke. `schedule()` coalesces bursts; `flushNow()` forces
 * an immediate write (call on page hide / before sync).
 *
 * @param {object} vfs
 * @param {() => PaiolStore} getStore  // late-bound so the latest state is always saved
 * @param {{ path?: string, delayMs?: number, setTimeoutFn?: Function, clearTimeoutFn?: Function }} [opts]
 */
function createDebouncedSaver(vfs, getStore, opts = {}) {
  const path = opts.path || DEFAULT_PATH;
  const delayMs = opts.delayMs ?? 800;
  const setT = opts.setTimeoutFn || setTimeout;
  const clearT = opts.clearTimeoutFn || clearTimeout;
  let timer = null;
  let dirty = false;
  /** @type {Promise<void>|null} */
  let inflight = null;

  async function flush() {
    dirty = false;
    inflight = saveStore(vfs, getStore(), path).then(() => {}, (e) => { dirty = true; throw e; });
    await inflight;
    inflight = null;
  }

  return {
    /** Mark dirty and (re)arm the debounce timer. */
    schedule() {
      dirty = true;
      if (timer) clearT(timer);
      timer = setT(() => { timer = null; flush().catch(() => {}); }, delayMs);
    },
    /** Force an immediate save if anything is pending. Awaits any in-flight write. */
    async flushNow() {
      if (timer) { clearT(timer); timer = null; }
      if (inflight) await inflight;
      if (dirty) await flush();
    },
    get pending() { return dirty || !!timer; },
  };
}

// ── path helpers ──────────────────────────────────────────────────────────────

function parentOf(path) {
  const i = path.lastIndexOf('/');
  return i <= 0 ? '/' : path.slice(0, i);
}

async function ensureDir(vfs, dir) {
  if (!dir || dir === '/') return;
  if (!(await vfs.exists(dir))) await vfs.mkdir(dir, { recursive: true });
}

// ── src/sync.js ──
// paiol — sync engine (§5). Backend-agnostic: it reconciles the local store against a remote
// YAML file over a VFS. The remote is a DropboxBackend in production, but the engine neither
// knows nor cares — any VFS works, which is why it's testable against a MemoryBackend.
//
// Convergence rests on the append-only log (§2.2): pull the remote, union-by-id into local,
// push the union back. Two devices that both append merge cleanly — there is no field-level
// conflict to resolve, only set union. (A true concurrent-write race is still possible in the
// window between read and write; the dated snapshots are the backstop, and v0.1 is single-user.)





/**
 * Reconcile `localStore` with the remote file at `path` on `vfs`. Mutates `localStore` to the
 * union, and writes the union back to the remote only if it actually changed (no redundant
 * uploads). Returns what moved each way.
 *
 * @param {PaiolStore} localStore
 * @param {object} vfs                      a @gcu/vfs VFS whose mount is the remote (e.g. Dropbox)
 * @param {{ path?: string, snapshotLabel?: string }} [opts]
 * @returns {Promise<{ pulledEvents: number, pulledMaster: number, pushed: boolean }>}
 */
async function syncOnce(localStore, vfs, opts = {}) {
  const path = opts.path || DEFAULT_PATH;

  const remoteText = (await vfs.exists(path)) ? await vfs.readFile(path, 'utf8') : null;
  const remote = remoteText == null ? new PaiolStore() : PaiolStore.fromYaml(remoteText);

  const pulled = localStore.merge(remote);

  const localText = localStore.toYaml();
  let pushed = false;
  if (localText !== remoteText) {
    // Snapshot the prior remote before overwriting, so recovery never depends on Dropbox's own
    // version history (§5 safety net).
    if (opts.snapshotLabel && remoteText != null) {
      // Place snapshots NEXT TO the business file (e.g. /snapshots beside /business.yaml), not
      // under a hard-coded /paiol — on the Dropbox app folder the app root already is "paiol".
      const dir = path.slice(0, path.lastIndexOf('/'));
      await snapshotStore(vfs, remote, opts.snapshotLabel, `${dir}/snapshots`).catch(() => {});
    }
    await saveStore(vfs, localStore, path);
    pushed = true;
  }

  return { pulledEvents: pulled.eventsAdded, pulledMaster: pulled.masterUpserted, pushed };
}

/**
 * Mount a VFS over Dropbox using an injected `getToken` (from the token manager). The App-folder
 * app sees its own folder as the root, so `root` is usually '' and paths are relative to
 * `/Apps/Paiol/`.
 *
 * @param {() => Promise<string>} getToken
 * @param {{ root?: string }} [opts]
 * @returns {Promise<object>} a mounted VFS
 */
async function openDropboxVfs(getToken, opts = {}) {
  const vfs = new VFS();
  await vfs.mount('/', new DropboxBackend({ getToken, root: opts.root || '' }));
  return vfs;
}

// ── src/dropbox-auth.js ──
// paiol — Dropbox PKCE OAuth (§5). PKCE = no client secret in the browser. The vendored
// DropboxBackend is auth-agnostic: it calls an injected `getToken()` per request and never
// touches OAuth. This module owns that token — the authorize redirect, the code exchange, and
// silent refresh — and hands a `getToken` to the backend.
//
// Pure where it can be: PKCE generation, URL building, and the exchange/refresh calls take an
// injected `fetch`/`crypto`/clock/storage, so the whole flow is testable headless. Only the
// actual browser redirect (window.location) lives at the edge.

const AUTHORIZE_URL = 'https://www.dropbox.com/oauth2/authorize';
const TOKEN_URL = 'https://api.dropboxapi.com/oauth2/token';
// App-folder app: these are the scopes paiol needs (declare the same set in the App Console).
const DEFAULT_SCOPES = ['files.content.read', 'files.content.write', 'files.metadata.read'];

// ── PKCE primitives ───────────────────────────────────────────────────────────

const b64url = (bytes) => {
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
};

/**
 * Generate a PKCE code verifier (RFC 7636): 43–128 chars from the unreserved set. base64url of
 * random bytes is a valid subset.
 * @param {Crypto} [cryptoObj]
 * @returns {string}
 */
function generateVerifier(cryptoObj = globalThis.crypto) {
  const bytes = new Uint8Array(64);
  cryptoObj.getRandomValues(bytes);
  return b64url(bytes); // ~86 chars
}

/**
 * The S256 code challenge for a verifier: base64url(SHA-256(verifier)).
 * @param {string} verifier
 * @param {Crypto} [cryptoObj]
 * @returns {Promise<string>}
 */
async function challengeFromVerifier(verifier, cryptoObj = globalThis.crypto) {
  const data = new TextEncoder().encode(verifier);
  const digest = await cryptoObj.subtle.digest('SHA-256', data);
  return b64url(new Uint8Array(digest));
}

/**
 * Build the authorize URL to redirect the user to. `token_access_type=offline` is what yields a
 * refresh token (so she only consents once).
 * @param {{ clientId: string, redirectUri: string, challenge: string, scopes?: string[], state?: string }} p
 * @returns {string}
 */
function buildAuthUrl({ clientId, redirectUri, challenge, scopes = DEFAULT_SCOPES, state }) {
  const q = new URLSearchParams({
    client_id: clientId,
    response_type: 'code',
    redirect_uri: redirectUri,
    code_challenge: challenge,
    code_challenge_method: 'S256',
    token_access_type: 'offline',
    scope: scopes.join(' '),
  });
  if (state) q.set('state', state);
  return `${AUTHORIZE_URL}?${q.toString()}`;
}

// ── Token exchange / refresh ───────────────────────────────────────────────────

/**
 * @typedef {object} TokenSet
 * @property {string} accessToken
 * @property {string} [refreshToken]
 * @property {number} expiresAt       // epoch ms when the access token expires
 * @property {string} [accountId]
 */

/**
 * Exchange an authorization code for tokens (after the redirect back).
 * @param {{ clientId: string, redirectUri: string, code: string, verifier: string, fetchFn?: Function, now?: () => number }} p
 * @returns {Promise<TokenSet>}
 */
async function exchangeCode({ clientId, redirectUri, code, verifier, fetchFn = fetch, now = Date.now }) {
  const body = new URLSearchParams({
    grant_type: 'authorization_code',
    code,
    client_id: clientId,
    redirect_uri: redirectUri,
    code_verifier: verifier,
  });
  return postToken(fetchFn, body, now);
}

/**
 * Silently mint a fresh access token from a refresh token.
 * @param {{ clientId: string, refreshToken: string, fetchFn?: Function, now?: () => number }} p
 * @returns {Promise<TokenSet>}
 */
async function refreshAccessToken({ clientId, refreshToken, fetchFn = fetch, now = Date.now }) {
  const body = new URLSearchParams({
    grant_type: 'refresh_token',
    refresh_token: refreshToken,
    client_id: clientId,
  });
  const set = await postToken(fetchFn, body, now);
  // Refresh responses omit the refresh_token; keep the one we already have.
  if (!set.refreshToken) set.refreshToken = refreshToken;
  return set;
}

async function postToken(fetchFn, body, now) {
  const resp = await fetchFn(TOKEN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString(),
  });
  if (!resp.ok) {
    const text = await resp.text().catch(() => '');
    throw new DropboxAuthError(`token endpoint ${resp.status}: ${text || resp.statusText}`);
  }
  const j = await resp.json();
  return {
    accessToken: j.access_token,
    refreshToken: j.refresh_token,
    expiresAt: now() + (j.expires_in ?? 14400) * 1000,
    accountId: j.account_id,
  };
}

// ── Token manager (what you inject into the DropboxBackend) ─────────────────────

/**
 * A token manager that returns a valid access token on demand, refreshing silently when the
 * current one is near expiry. Persist the token set however you like (IndexedDB / localStorage)
 * via `load`/`save`.
 *
 * @param {object} p
 * @param {string}   p.clientId
 * @param {() => (TokenSet|null|Promise<TokenSet|null>)} p.load   // read the stored token set
 * @param {(t: TokenSet) => void|Promise<void>}          p.save   // persist a refreshed set
 * @param {Function} [p.fetchFn]
 * @param {() => number} [p.now]
 * @param {number}  [p.skewMs]   // refresh this many ms before actual expiry (default 60s)
 * @returns {{ getToken: () => Promise<string>, isLinked: () => Promise<boolean> }}
 */
function createTokenManager({ clientId, load, save, fetchFn = fetch, now = Date.now, skewMs = 60_000 }) {
  /** @type {Promise<string>|null} */
  let inflight = null;

  async function resolve() {
    const set = await load();
    if (!set || !set.accessToken) throw new DropboxAuthError('nao conectado ao Dropbox');
    if (set.expiresAt - skewMs > now()) return set.accessToken; // still valid
    if (!set.refreshToken) throw new DropboxAuthError('token expirado e sem refresh token — reconecte');
    const fresh = await refreshAccessToken({ clientId, refreshToken: set.refreshToken, fetchFn, now });
    await save(fresh);
    return fresh.accessToken;
  }

  return {
    getToken() {
      // Coalesce concurrent callers so we refresh at most once.
      if (!inflight) inflight = resolve().finally(() => { inflight = null; });
      return inflight;
    },
    async isLinked() {
      const set = await load();
      return !!(set && (set.refreshToken || set.expiresAt - skewMs > now()));
    },
  };
}

class DropboxAuthError extends Error {
  constructor(message) {
    super(message);
    this.name = 'DropboxAuthError';
  }
}

// ── src/config.js ──
// paiol — app configuration. The Dropbox app key is a PUBLIC client id (PKCE uses no secret),
// so it lives in the shipped file. The redirect URI must EXACTLY match one registered in the
// Dropbox App Console; we pick by origin.

const DROPBOX_APP_KEY = 'co3pz3u3sqx84m2';

// Where Dropbox stores everything (App-folder app → relative to /Apps/Paiol/).
const REMOTE_BUSINESS_PATH = '/business.yaml';
// Local IndexedDB database name (via @gcu/vfs idb backend).
const LOCAL_DB_NAME = 'paiol';

/**
 * The OAuth redirect URI for the current origin. Must be registered verbatim in the App Console:
 *   - http://localhost:8080/        (local dev — served by tools/dev-server.js)
 *   - https://gentropic.org/paiol/  (production, §6)
 * @returns {string}
 */
function redirectUri() {
  const { hostname } = location;
  if (hostname === 'localhost' || hostname === '127.0.0.1') return 'http://localhost:8080/';
  return 'https://gentropic.org/paiol/';
}

// ── src/auth-flow.js ──
// paiol — browser glue for the Dropbox PKCE flow. The pure mechanics live in dropbox-auth.js
// (tested headless); this file is the thin browser edge: redirect, callback, token storage.
//
//   connect → stash verifier, redirect to Dropbox
//   ...user consents, Dropbox redirects back with ?code=...
